version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      radix-ui:
        patterns: ["@radix-ui/*"]
      tanstack:
        patterns: ["@tanstack/*"]
    ignore:
      - dependency-name: "@lovable.dev/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly